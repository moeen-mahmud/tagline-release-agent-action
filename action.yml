name: "Tagline Release Action"
description: "Executes a release plan prepared by the Tagline bot — bumps versions, writes CHANGELOG.md, tags, releases, opens PR."
author: "tagline-sh"
branding:
  icon: "tag"
  color: "green"

inputs:
  release_plan:
    description: "JSON-encoded ReleasePlan object (provided by the Tagline bot). Required for workflow_dispatch (propose mode); ignored for pull_request: closed events (finalize mode)."
    required: false
    default: ""
  github_token:
    description: "GitHub token with contents, pull-requests, and issues write permissions (issues write is needed by Phase B to close the release-tracking issue)."
    required: true
  issue_number:
    description: "Release-tracking issue number, passed through by the bot during workflow_dispatch. Phase B closes this issue on success. Empty for legacy / dry-run plans."
    required: false
    default: ""
  dry_run:
    description: "If true, simulate all steps without making changes"
    required: false
    default: "false"

outputs:
  version:
    description: "The new version that was released"
  tag:
    description: "The git tag that was created"
  release_url:
    description: "URL of the created GitHub release"
  pr_url:
    description: "URL of the opened changelog PR"

runs:
  using: "node20"
  main: "dist/index.js"
